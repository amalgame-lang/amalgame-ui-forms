name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Test against amc ${{ matrix.amc-tag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        amc-tag: [v0.8.7]
    steps:
      - name: Checkout amalgame-ui-forms
        uses: actions/checkout@v4
        with:
          path: amalgame-ui-forms

      - name: Checkout amalgame-ui-sdl (sibling dep)
        uses: actions/checkout@v4
        with:
          repository: amalgame-lang/amalgame-ui-sdl
          ref: develop
          path: amalgame-ui-sdl

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgc-dev libcurl4-openssl-dev libsdl2-dev libsdl2-ttf-dev

      - name: Download amc ${{ matrix.amc-tag }}
        run: |
          set -e
          TAG="${{ matrix.amc-tag }}"
          VERSION="${TAG#v}"
          curl -sSL -o amc.tar.gz \
            "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p $RUNNER_TEMP/amc-install
          tar -xzf amc.tar.gz -C $RUNNER_TEMP/amc-install --strip-components=1
          # XDG layout since amc v0.8.1 (PR #398): bin/amc and
          # share/amalgame/runtime/ instead of flat amc + runtime/.
          if [ -x "$RUNNER_TEMP/amc-install/bin/amc" ]; then
            echo "AMC=$RUNNER_TEMP/amc-install/bin/amc" >> $GITHUB_ENV
            echo "AMC_RUNTIME=$RUNNER_TEMP/amc-install/share/amalgame/runtime" >> $GITHUB_ENV
          else
            echo "AMC=$RUNNER_TEMP/amc-install/amc" >> $GITHUB_ENV
            echo "AMC_RUNTIME=$RUNNER_TEMP/amc-install/runtime" >> $GITHUB_ENV
          fi
          echo "UI_SDL_ROOT=$GITHUB_WORKSPACE/amalgame-ui-sdl" >> $GITHUB_ENV

      - name: Verify amc
        run: $AMC --version

      - name: Run tests
        working-directory: amalgame-ui-forms
        run: ./tests/run_tests.sh "$AMC"
